name: Python (ml-service)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('apps/ml-service/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Node deps for shared-types codegen
        working-directory: ${{ github.workspace }}
        run: npm ci --workspaces --include-workspace-root

      - name: Lint (ruff)
        run: ruff check .

      - name: Type-check (mypy)
        run: mypy lumo_ml/

      - name: Tests (pytest)
        run: pytest

      - name: Shared-types drift check
        working-directory: ${{ github.workspace }}
        run: bash packages/lumo-shared-types/scripts/check-drift.sh
