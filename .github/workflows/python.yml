name: Python (ml-service)

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: apps/ml-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py311-${{ hashFiles('apps/ml-service/pyproject.toml') }}
          restore-keys: |
            pip-${{ runner.os }}-py311-

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Node deps for shared-types codegen
        working-directory: ${{ github.workspace }}
        run: npm ci --workspaces --include-workspace-root

      - name: Lint (ruff)
        run: ruff check .

      - name: Lint (traced-coverage)
        # Fails the build if a public function in scope ships without
        # @traced (or a documented `# noqa: TRC001 — <reason>` opt-out).
        # Scope ratchets up lane-by-lane via DEFAULT_TARGETS in
        # scripts/lint-traced-coverage.py.
        run: python scripts/lint-traced-coverage.py

      - name: Type-check (mypy)
        run: mypy lumo_ml/

      - name: Tests (pytest)
        run: pytest

      - name: Shared-types drift check
        working-directory: ${{ github.workspace }}
        run: bash packages/lumo-shared-types/scripts/check-drift.sh

  modal-smoke:
    # Hits the deployed brain at LUMO_ML_AGENT_URL and asserts
    # /api/health returns 200. Always runs but no-ops when the env is
    # absent (forks / unconfigured repos) so it never blocks a merge.
    # Repository owners should set LUMO_ML_AGENT_URL as a GitHub Actions
    # secret to enable the assertion.
    runs-on: ubuntu-latest
    needs: python
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Detect ml-service / shared-types changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            ml:
              - 'apps/ml-service/**'
              - 'packages/lumo-shared-types/**'
      - name: Smoke /api/health
        if: ${{ github.event_name == 'push' || steps.filter.outputs.ml == 'true' }}
        env:
          LUMO_ML_AGENT_URL: ${{ secrets.LUMO_ML_AGENT_URL }}
        run: |
          set -euo pipefail
          if [ -z "${LUMO_ML_AGENT_URL:-}" ]; then
            echo "LUMO_ML_AGENT_URL not set; skipping smoke."
            exit 0
          fi
          URL="${LUMO_ML_AGENT_URL%/}"
          echo "Probing $URL/api/health"
          STATUS=$(curl -sS -o /tmp/health.json -w '%{http_code}' "$URL/api/health")
          echo "HTTP $STATUS"
          cat /tmp/health.json
          test "$STATUS" = "200"
