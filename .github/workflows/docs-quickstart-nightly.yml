name: Docs quickstart nightly

on:
  schedule:
    - cron: "30 8 * * *"
  workflow_dispatch:

jobs:
  quickstart:
    runs-on: ubuntu-latest
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_AGENT_PLATFORM }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run docs:api-ref
      - run: npm run docs:build
      - run: cd apps/web && node --experimental-strip-types tests/docs-quickstart-e2e.test.mjs
      - name: Notify Slack on failure
        if: ${{ failure() && env.SLACK_WEBHOOK_URL != '' }}
        uses: slackapi/slack-github-action@v1
        with:
          payload: '{"text":"Lumo agent docs quickstart nightly failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}'
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
