name: iOS Build

on:
  push:
    branches: [main]
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "apps/ios/**"
      - ".github/workflows/ios-build.yml"

jobs:
  build:
    name: xcodegen + xcodebuild (Debug, iPhone 17 Simulator)
    runs-on: macos-15
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Show toolchain versions
        run: |
          xcodebuild -version
          xcodegen --version
          xcrun simctl list runtimes | head -10

      - name: Generate Xcode project
        working-directory: apps/ios
        run: xcodegen generate

      # Code signing is intentionally disabled in project.yml for the
      # bootstrap sprint (CODE_SIGNING_ALLOWED=NO). When real signing is
      # introduced, this workflow needs CODE_SIGN_IDENTITY + provisioning
      # profile secrets — that's a Phase 5 sprint, not this one.
      - name: Build (Debug, simulator)
        working-directory: apps/ios
        run: |
          xcodebuild \
            -project Lumo.xcodeproj \
            -scheme Lumo \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -configuration Debug \
            build \
            CODE_SIGNING_ALLOWED=NO

      - name: Test
        working-directory: apps/ios
        run: |
          xcodebuild test \
            -project Lumo.xcodeproj \
            -scheme Lumo \
            -destination 'platform=iOS Simulator,name=iPhone 17' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO
