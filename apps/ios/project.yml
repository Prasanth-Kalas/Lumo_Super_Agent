name: Lumo
options:
  bundleIdPrefix: com.lumo.rentals
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

# Build-time configuration. `Lumo.xcconfig` is committed and `#include?`s
# the gitignored `Lumo.local.xcconfig` written by
# `scripts/ios-write-xcconfig.sh` from env. CI / fresh clones build with
# empty values; the app surfaces a clean "auth not configured" state
# rather than crashing.
configFiles:
  Debug: Lumo.xcconfig
  Release: Lumo.xcconfig

# Pinned remote SwiftPM dependencies. Supabase Swift SDK provides
# `Supabase` (high-level client) and `Auth` (session storage protocol +
# Apple Sign-In id-token exchange). 2.x is the current major; we pin
# loosely to allow patch + minor updates but block 3.x without review.
packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Lumo:
    type: application
    platform: iOS
    sources:
      - path: Lumo
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Supabase
        product: Auth
    settings:
      base:
        PRODUCT_NAME: Lumo
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Lumo/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lumo/Lumo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTED_PLATFORMS: "iphonesimulator iphoneos"
        SDKROOT: iphoneos
        # Surface xcconfig values to Info.plist so the running app can
        # read them at launch (see Lumo/Resources/Info.plist). URL is
        # split scheme/host because xcconfig truncates at `//`.
        INFOPLIST_KEY_LumoSupabaseURLScheme: $(LUMO_SUPABASE_URL_SCHEME)
        INFOPLIST_KEY_LumoSupabaseURLHost: $(LUMO_SUPABASE_URL_HOST)
        INFOPLIST_KEY_LumoSupabaseAnonKey: $(LUMO_SUPABASE_ANON_KEY)
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.dev
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios
          SWIFT_OPTIMIZATION_LEVEL: -O

  LumoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumoTests
    dependencies:
      - target: Lumo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.tests
        GENERATE_INFOPLIST_FILE: YES

# Explicit shared scheme so xcodebuild on a fresh checkout (or after a
# `rm -rf Lumo.xcodeproj`) finds a destination. xcodegen 2.45 does not
# generate a shared scheme by default for this target shape; without
# one xcodebuild's destination resolution fails with "Supported
# platforms for the buildables in the current scheme is empty".
schemes:
  Lumo:
    build:
      targets:
        Lumo: all
        LumoTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - LumoTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

