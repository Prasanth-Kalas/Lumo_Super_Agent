name: Lumo
options:
  bundleIdPrefix: com.lumo.rentals
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGN_IDENTITY: ""
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO

targets:
  Lumo:
    type: application
    platform: iOS
    sources:
      - path: Lumo
    settings:
      base:
        PRODUCT_NAME: Lumo
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: Lumo/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Lumo/Lumo.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.dev
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios
          SWIFT_OPTIMIZATION_LEVEL: -O

  LumoTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: LumoTests
    dependencies:
      - target: Lumo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lumo.rentals.ios.tests
        GENERATE_INFOPLIST_FILE: YES
